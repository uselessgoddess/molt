name: Benchmarks

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "crates/molt-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "justfile"
      - "rust-toolchain.toml"

permissions:
  contents: read

jobs:
  track:
    name: Measure and preserve a baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just bench-track
      - uses: actions/upload-artifact@v7
        with:
          name: molt-core-bench-${{ github.sha }}
          path: bench-output.txt
          if-no-files-found: error
          retention-days: 90
