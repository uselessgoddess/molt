name: Benchmarks

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "crates/molt-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "justfile"
      - "rust-toolchain.toml"

jobs:
  ring:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just bench
      - uses: actions/upload-artifact@v7
        with:
          name: criterion-ring-results
          path: target/criterion
          if-no-files-found: error
