name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, lint, test, benchmark build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-nextest
      - run: just check

  boot:
    name: Build images and boot in QEMU
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86
      - run: just smoke
      - uses: actions/upload-artifact@v7
        with:
          name: molt-x86_64-images
          path: target/molt/*.img
          if-no-files-found: error
