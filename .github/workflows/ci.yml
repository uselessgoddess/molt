name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, lint, test, benchmark build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-nextest
      - run: just pre

  atomics:
    name: Test on ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: aarch64-linux
            runner: ubuntu-24.04-arm
          - name: aarch64-macos
            runner: macos-15
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --package molt-core

  miri:
    name: Miri
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: miri
          rustflags: ""
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just miri

  loom:
    name: Loom
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'loom')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just loom

  boot:
    name: Build images and boot in QEMU
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-system-misc
      - run: just smoke
      - uses: actions/upload-artifact@v7
        with:
          name: molt-x86_64-images
          path: target/molt/*.img
          if-no-files-found: error
