[workspace]
resolver = "3"
members = ["crates/molt-core", "kernel", "xtask"]
default-members = ["crates/molt-core", "xtask"]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"

[workspace.dependencies]
bootloader_api = "0.11.15"
molt-core = { path = "crates/molt-core" }

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"

[profile.micro]
inherits = "release"
codegen-units = 1
opt-level = 3
lto = true
strip = true

[profile.nano]
inherits = "micro"
opt-level = "z"
panic = "abort"
